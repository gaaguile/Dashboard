<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.min.css"
    />
    <style>
      :root {
        --text-success: #10b981;
        --text-danger: #f43f5e;
        --text-muted: #64748b;
        --text-secondary: #94a3b8;
        --surface-1: #f8fafc;
        --radius: 0.75rem;
        --primary: #6366f1;
        --primary-light: #818cf8;
        --primary-dark: #4f46e5;
        --accent-cyan: #06b6d4;
        --accent-pink: #ec4899;
        --accent-violet: #a855f7;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen",
          "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue",
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(
          135deg,
          #0f172a 0%,
          #1e293b 50%,
          #0f172a 100%
        );
        color: #0f172a;
        min-height: 100vh;
      }

      #root {
        padding: 2.5rem;
        max-width: 1400px;
        margin: 0 auto;
      }

      /* Card hover effect */
      [data-metric-card] {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      [data-metric-card]:hover {
        transform: translateY(-4px);
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.12) !important;
      }

      /* Refresh button hover effect */
      [data-refresh-btn]:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4) !important;
      }

      [data-refresh-btn]:active {
        transform: translateY(0);
      }
    </style>
    <script type="module" crossorigin src="/assets/index-C_NFHPIY.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
